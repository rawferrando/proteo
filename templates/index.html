<!DOCTYPE html>
<html>
<head>
    <title>PRESENS Monitor Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .dashboard { background: white; width: 100%; max-width: 500px; border-radius: 24px; padding: 30px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .status-badge { float: right; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .active { background: #c6f6d5; color: #2f855a; }
        .stopped { background: #fed7d7; color: #c53030; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #f7fafc; padding: 15px; border-radius: 15px; border: 1px solid #edf2f7; }
        .label { font-size: 0.7rem; color: #a0aec0; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 1.5rem; font-weight: bold; color: #2d3748; margin-top: 5px; }
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-set { background: #667eea; color: white; width: auto; flex: none; }
    </style>
</head>
<body>
    <div class="dashboard">
        <span id="badge" class="status-badge stopped">PARADO</span>
        <h1 style="margin: 0; font-size: 1.4rem; color: #4a5568;">PRESENS Monitor</h1>

        <div class="controls">
            <button style="background: #48bb78; color: white;" onclick="run('start')">START</button>
            <button style="background: #f56565; color: white;" onclick="run('stop')">STOP</button>
        </div>

        <div class="card" style="border-left: 5px solid #667eea; margin-bottom: 20px;">
            <div class="label">Límite Purga (Nitrógeno)</div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <span>Objetivo: <b id="target-display">--</b>%</span>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="target-input" value="19.7" step="0.1" style="width: 55px; padding: 5px; border-radius: 5px; border: 1px solid #ddd;">
                    <button class="btn-set" onclick="setT()">SET</button>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card"><div class="label">Oxígeno</div><div class="value"><span id="o2">--</span> %</div></div>
            <div class="card"><div class="label">Temperatura</div><div class="value"><span id="temp">--</span> °C</div></div>
            <div class="card"><div class="label">Fase</div><div class="value"><span id="phase">--</span> °</div></div>
            <div class="card"><div class="label">Amplitud</div><div class="value" style="font-size: 1.2rem;"><span id="amp">--</span></div></div>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/status').then(r => r.json()).then(data => {
                const b = document.getElementById('badge');
                b.innerText = data.measuring ? "MIDIENDO..." : "PARADO";
                b.className = "status-badge " + (data.measuring ? "active" : "stopped");
                document.getElementById('target-display').innerText = data.target;
                if(data.measurements.length > 0) {
                    const m = data.measurements[data.measurements.length - 1];
                    document.getElementById('o2').innerText = m.oxygen.toFixed(2);
                    document.getElementById('temp').innerText = m.temperature.toFixed(1);
                    document.getElementById('phase').innerText = m.phase.toFixed(2);
                    document.getElementById('amp').innerText = m.amplitude;
                }
            });
        }
        function run(a) { fetch('/api/'+a, {method:'POST'}).then(() => update()); }
        function setT() {
            const t = document.getElementById('target-input').value;
            fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({target: t})
            }).then(() => { update(); alert('Límite actualizado'); });
        }
        setInterval(update, 2000);
    </script>
</body>
</html>
